<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Döviz Hesaplayıcı</title>

<style>
body{
font-family:Arial;
background:#f4f4f4;
text-align:center;
margin-top:60px;
}

.box{
background:white;
padding:40px;
width:320px;
margin:auto;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input,button{
width:100%;
padding:12px;
margin-top:10px;
font-size:16px;
}

button{
background:#222;
color:white;
border:none;
border-radius:5px;
}

.result{
margin-top:20px;
font-size:20px;
font-weight:bold;
}
</style>
</head>

<body>

<div class="box">

<h2>Euro Hesapla</h2>

<input id="tl" placeholder="Hizmet TL fiyatı">

<input id="kur" placeholder="Euro kuru (örnek 50.20)" value="50.20">

<input id="verilen" placeholder="Müşteri verdiği € (opsiyonel)">

<button onclick="hesapla()">Hesapla</button>

<div class="result" id="sonuc"></div>

</div>

<script>

function hesapla(){

var tl = parseFloat(document.getElementById("tl").value);

var kur = parseFloat(document.getElementById("kur").value);

var verilen = parseFloat(document.getElementById("verilen").value);

var gerekenEuro = tl / kur;

var sonuc = "Gereken €: " + gerekenEuro.toFixed(2);

if(verilen){

var paraUstuEuro = verilen - gerekenEuro;

var paraUstuTL = paraUstuEuro * kur;

sonuc += "<br>Para üstü €: " + paraUstuEuro.toFixed(2);

sonuc += "<br>TL iade: " + paraUstuTL.toFixed(0) + " TL";

}

document.getElementById("sonuc").innerHTML = sonuc;

}

</script>

</body>
</html>
