<script>

let kurlar = {
EUR: 51.20,
USD: 44.07,
GBP: 59.10
};

async function kurCek(){

try{

let eur = await fetch("https://api.exchangerate.host/latest?base=EUR&symbols=TRY");
let eurData = await eur.json();

let usd = await fetch("https://api.exchangerate.host/latest?base=USD&symbols=TRY");
let usdData = await usd.json();

let gbp = await fetch("https://api.exchangerate.host/latest?base=GBP&symbols=TRY");
let gbpData = await gbp.json();

kurlar.EUR = eurData.rates.TRY;
kurlar.USD = usdData.rates.TRY;
kurlar.GBP = gbpData.rates.TRY;

guncelleTablo();

}
catch(e){
console.log("Kur çekilemedi, son değer kullanılıyor.");
}

}

function guncelleTablo(){

document.getElementById("piyasa-eur").textContent = kurlar.EUR.toFixed(2);
document.getElementById("alis-eur").textContent = (kurlar.EUR - 1).toFixed(2);

document.getElementById("piyasa-usd").textContent = kurlar.USD.toFixed(2);
document.getElementById("alis-usd").textContent = (kurlar.USD - 1).toFixed(2);

document.getElementById("piyasa-gbp").textContent = kurlar.GBP.toFixed(2);
document.getElementById("alis-gbp").textContent = (kurlar.GBP - 1.20).toFixed(2);

}

window.onload = function(){

kurCek();

setInterval(kurCek,600000);

};

function hesapla(){

const tur = document.getElementById("dovizTuru").value;

let tl = parseFloat(document.getElementById("tl").value) || 0;
let verdi = parseFloat(document.getElementById("doviz").value) || 0;

if(tl<=0 || verdi<=0){
alert("Pozitif tutar girin.");
return;
}

let alisKur = kurlar[tur];

if(tur==="EUR" || tur==="USD"){
alisKur -= 1;
}
else if(tur==="GBP"){
alisKur -= 1.20;
}

let odeme = tl / alisKur;
let ust = verdi - odeme;
let tlUstu = ust * alisKur;

const sembol = tur==="EUR" ? "€" : tur==="USD" ? "$" : "£";

document.getElementById("odenecek").innerHTML = odeme.toFixed(2)+" "+sembol;
document.getElementById("verdi").innerHTML = verdi.toFixed(2)+" "+sembol;

if(ust>=0){
document.getElementById("ustu").innerHTML = ust.toFixed(2)+" "+sembol;
document.getElementById("tlustu").innerHTML = Math.round(tlUstu)+" TL";
}
else{
document.getElementById("ustu").innerHTML = "Eksik: "+Math.abs(ust).toFixed(2)+" "+sembol;
document.getElementById("tlustu").innerHTML = "Eksik: "+Math.abs(Math.round(tlUstu))+" TL";
}

}

function temizle(){

document.getElementById("tl").value="";
document.getElementById("doviz").value="";

document.getElementById("odenecek").innerHTML="0.00";
document.getElementById("verdi").innerHTML="0.00";
document.getElementById("ustu").innerHTML="0.00";
document.getElementById("tlustu").innerHTML="0";

document.getElementById("dovizTuru").value="EUR";

}

</script>
