<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Döviz Hesaplayıcı</title>

<style>

body{
font-family:Arial;
background:#f3f4f6;
margin:0;
padding:0;
}

.container{
max-width:650px;
margin:auto;
padding:15px;
}

.card{
background:white;
border-radius:12px;
padding:20px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

h2{
text-align:center;
margin-bottom:15px;
}

.input{
width:100%;
padding:10px;
margin:8px 0;
font-size:18px;
border-radius:8px;
border:1px solid #ccc;
}

.btn{
width:48%;
padding:12px;
font-size:18px;
border:none;
border-radius:8px;
cursor:pointer;
}

.btn-green{
background:#28a745;
color:white;
}

.btn-gray{
background:#6c757d;
color:white;
}

.row{
display:flex;
justify-content:space-between;
margin-top:10px;
}

.result{
background:#f8f9fa;
padding:15px;
border-radius:10px;
margin-top:12px;
font-size:20px;
}

.highlight{
background:#e8f5e9;
font-weight:bold;
}

.note{
margin-top:10px;
font-size:14px;
color:#666;
text-align:center;
}

</style>
</head>

<body>

<div class="container">

<div class="card">

<h2>Döviz Hesaplayıcı</h2>

<input id="tl" class="input" placeholder="İşlem Tutarı (TL)">

<input id="doviz" class="input" placeholder="Müşteri Verdiği Döviz">

<div class="row">

<button class="btn btn-green" onclick="hesapla()">HESAPLA</button>

<button class="btn btn-gray" onclick="temizle()">YENİ</button>

</div>

<div class="result">
Ödenecek Döviz: <span id="odenecek">0</span>
</div>

<div class="row">

<div class="result">
Müşteri Verdi: <span id="verdi">0</span>
</div>

<div class="result">
Para Üstü Döviz: <span id="ustu">0</span>
</div>

</div>

<div class="result highlight">
TL Para Üstü: <span id="tlustu">0</span>
</div>

<div class="note">
Para üstü TL olarak verilir.
</div>

</div>

</div>

<script>

let kur=51.20;

function hesapla(){

let tl=document.getElementById("tl").value;

let verdi=document.getElementById("doviz").value;

let odeme=(tl/kur);

let ust=verdi-odeme;

let tlustu=ust*kur;

document.getElementById("odenecek").innerHTML=odeme.toFixed(2)+" €";

document.getElementById("verdi").innerHTML=verdi+" €";

document.getElementById("ustu").innerHTML=ust.toFixed(2)+" €";

document.getElementById("tlustu").innerHTML=Math.round(tlustu)+" TL";

}

function temizle(){

document.getElementById("tl").value="";

document.getElementById("doviz").value="";

document.getElementById("odenecek").innerHTML="0";

document.getElementById("verdi").innerHTML="0";

document.getElementById("ustu").innerHTML="0";

document.getElementById("tlustu").innerHTML="0";

}

</script>

</body>
</html>
