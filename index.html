<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Döviz Kıyas Ekranı</title>

<style>
*{box-sizing:border-box}

body{
margin:0;
font-family:Arial;
background:#e9edf3;
padding:10px;
}

.app{
max-width:1100px;
margin:auto;
background:#f4f6fa;
border-radius:18px;
box-shadow:0 6px 18px rgba(0,0,0,0.12);
overflow:hidden;
}

.topbar{
background:#243f73;
color:white;
padding:18px;
text-align:center;
font-weight:800;
font-size:22px;
}

.content{
padding:18px;
}

.label{
font-size:14px;
font-weight:700;
margin:10px 0 6px;
color:#667085;
}

.inputbox{
background:white;
border-radius:12px;
border:1px solid #cfd7e3;
}

input{
width:100%;
border:none;
padding:18px;
font-size:22px;
font-weight:700;
outline:none;
}

.cards{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:14px;
margin-top:20px;
}

.card{
border-radius:14px;
padding:18px;
color:white;
text-align:center;
}

.usd{background:#243f73}
.eur{background:#4d8750}
.gbp{background:#243f73}

.title{
font-size:18px;
font-weight:800;
margin-bottom:10px;
}

.big{
font-size:26px;
font-weight:800;
margin:10px 0;
}

.small{
font-size:16px;
}

.diff{
margin-top:10px;
font-weight:800;
font-size:18px;
}

.green{color:#7CFF9E}
.red{color:#FFB3B3}

.rates{
background:white;
margin-top:20px;
padding:14px;
border-radius:12px;
text-align:center;
}

.rates span{
margin:0 20px;
font-weight:800;
font-size:18px;
}

.buttons{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-top:20px;
}

button{
border:none;
padding:16px;
font-size:20px;
font-weight:800;
border-radius:10px;
cursor:pointer;
}

.calc{background:#239a2b;color:white}
.reset{background:#5c6778;color:white}

@media(max-width:900px){
.cards{grid-template-columns:1fr}
}
</style>
</head>

<body>

<div class="app">

<div class="topbar">İŞLEM TUTARI</div>

<div class="content">

<div class="label">İşlem Tutarı (TL)</div>
<div class="inputbox">
<input id="tl" placeholder="Örn 9.000">
</div>

<div class="label">ÖDENEN TUTAR</div>
<div class="inputbox">
<input id="rakam" placeholder="Örn 200">
</div>

<div class="cards">

<div class="card usd">
<div class="title">USD</div>
<div class="big" id="usd1">0 $</div>
<div class="small" id="usd2">0 $ = 0 TL</div>
<div class="diff" id="usd3"></div>
</div>

<div class="card eur">
<div class="title">EUR</div>
<div class="big" id="eur1">0 €</div>
<div class="small" id="eur2">0 € = 0 TL</div>
<div class="diff" id="eur3"></div>
</div>

<div class="card gbp">
<div class="title">GBP</div>
<div class="big" id="gbp1">0 £</div>
<div class="small" id="gbp2">0 £ = 0 TL</div>
<div class="diff" id="gbp3"></div>
</div>

</div>

<div class="rates">
<span>€ <span id="re">0</span></span>
<span>$ <span id="ru">0</span></span>
<span>£ <span id="rg">0</span></span>
</div>

<div class="buttons">
<button class="calc" onclick="hesapla()">HESAPLA</button>
<button class="reset" onclick="temizle()">YENİ</button>
</div>

</div>
</div>

<script>

let kur={EUR:0,USD:0,GBP:0}

function format(x){
return x.toLocaleString('tr-TR')
}

async function kurCek(){

try{

let e=await fetch("https://api.frankfurter.dev/v1/latest?base=EUR&symbols=TRY")
let u=await fetch("https://api.frankfurter.dev/v1/latest?base=USD&symbols=TRY")
let g=await fetch("https://api.frankfurter.dev/v1/latest?base=GBP&symbols=TRY")

let ej=await e.json()
let uj=await u.json()
let gj=await g.json()

kur.EUR=ej.rates.TRY
kur.USD=uj.rates.TRY
kur.GBP=gj.rates.TRY

document.getElementById("re").innerText=kur.EUR.toFixed(2)
document.getElementById("ru").innerText=kur.USD.toFixed(2)
document.getElementById("rg").innerText=kur.GBP.toFixed(2)

}catch{}

}

function hesapla(){

let tl=parseFloat(document.getElementById("tl").value.replace(".",""))||0
let r=parseFloat(document.getElementById("rakam").value)||0

if(tl>0) document.getElementById("tl").value=format(tl)

let usd=tl/kur.USD
let eur=tl/kur.EUR
let gbp=tl/kur.GBP

let usdTL=r*kur.USD
let eurTL=r*kur.EUR
let gbpTL=r*kur.GBP

document.getElementById("usd1").innerText=usd.toFixed(2)+" $"
document.getElementById("eur1").innerText=eur.toFixed(2)+" €"
document.getElementById("gbp1").innerText=gbp.toFixed(2)+" £"

document.getElementById("usd2").innerText=r+" $ = "+Math.round(usdTL)+" TL"
document.getElementById("eur2").innerText=r+" € = "+Math.round(eurTL)+" TL"
document.getElementById("gbp2").innerText=r+" £ = "+Math.round(gbpTL)+" TL"

if(tl>0){

diff("usd3",usdTL-tl)
diff("eur3",eurTL-tl)
diff("gbp3",gbpTL-tl)

}

}

function diff(id,v){

let e=document.getElementById(id)

if(v>0){
e.innerText="Fazla "+Math.round(v)+" TL"
e.className="diff green"
}
else if(v<0){
e.innerText="Eksik "+Math.abs(Math.round(v))+" TL"
e.className="diff red"
}
else{
e.innerText="Tam"
}

}

function temizle(){
location.reload()
}

window.onload=function(){
kurCek()
setInterval(kurCek,600000)
}

</script>

</body>
</html>
