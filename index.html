<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Döviz Hesaplayıcı</title>

<style>

body{
font-family:Arial;
background:#f3f4f6;
margin:0;
padding:0;
}

.container{
max-width:700px;
margin:auto;
padding:10px;
}

.card{
background:white;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,0.08);
padding:14px;
}

.header{
background:#eef2f7;
padding:10px;
border-radius:8px;
font-size:16px;
font-weight:bold;
margin-bottom:10px;
}

.tabs{
display:flex;
gap:6px;
margin-bottom:10px;
}

.tabs button{
flex:1;
padding:10px;
font-size:16px;
border:none;
border-radius:8px;
background:#e5e7eb;
font-weight:bold;
}

.tabs button.active{
background:#2563eb;
color:white;
}

input{
width:100%;
padding:12px;
font-size:18px;
margin-bottom:10px;
border-radius:8px;
border:1px solid #ccc;
}

.buttons{
display:flex;
gap:6px;
margin-bottom:10px;
}

.calc{
flex:1;
background:#22c55e;
color:white;
border:none;
padding:12px;
font-size:18px;
border-radius:8px;
font-weight:bold;
}

.reset{
flex:1;
background:#9ca3af;
color:white;
border:none;
padding:12px;
font-size:18px;
border-radius:8px;
font-weight:bold;
}

.result{
background:#eef5ff;
padding:12px;
border-radius:8px;
font-size:22px;
font-weight:bold;
margin-bottom:8px;
}

.small{
background:#ecfdf5;
padding:10px;
border-radius:8px;
font-size:18px;
}

</style>
</head>

<body>

<div class="container">

<div class="card">

<div class="header">
Piyasa Kur: <span id="piyasa">51.19</span> TL  
Salon Alış: <span id="salon">50.19</span> TL
</div>

<div class="tabs">
<button onclick="sec('EUR')" class="active" id="eur">EURO</button>
<button onclick="sec('USD')" id="usd">USD</button>
<button onclick="sec('GBP')" id="gbp">GBP</button>
</div>

<input id="tl" placeholder="İşlem Tutarı TL">

<input id="doviz" placeholder="Müşteri verdiği döviz (örn 100)">

<div class="buttons">
<button class="calc" onclick="hesapla()">HESAPLA</button>
<button class="reset" onclick="temizle()">YENİ</button>
</div>

<div class="result" id="odenecek">
-
</div>

<div class="small" id="tlkarsilik">
-
</div>

</div>

</div>

<script>

let kur={
EUR:51.19,
USD:44.06,
GBP:59.05
}

let secili="EUR"

function sec(x){

secili=x

document.getElementById("eur").classList.remove("active")
document.getElementById("usd").classList.remove("active")
document.getElementById("gbp").classList.remove("active")

document.getElementById(x.toLowerCase()).classList.add("active")

let piyasa=kur[x]
let salon=piyasa-1

if(x=="GBP"){salon=piyasa-1.26}

document.getElementById("piyasa").innerText=piyasa.toFixed(2)
document.getElementById("salon").innerText=salon.toFixed(2)

}

function hesapla(){

let tl=document.getElementById("tl").value
let doviz=document.getElementById("doviz").value

let piyasa=kur[secili]
let salon=piyasa-1

if(secili=="GBP"){salon=piyasa-1.26}

if(tl!=""){

let odenecek=(tl/salon)

document.getElementById("odenecek").innerText=
"Ödenecek: "+odenecek.toFixed(2)+" "+secili

}

if(doviz!=""){

let tlk=doviz*salon

document.getElementById("tlkarsilik").innerText=
"TL Karşılığı: "+Math.round(tlk)+" TL"

}

}

function temizle(){

document.getElementById("tl").value=""
document.getElementById("doviz").value=""

document.getElementById("odenecek").innerText="-"
document.getElementById("tlkarsilik").innerText="-"

}

</script>

</body>
</html>
