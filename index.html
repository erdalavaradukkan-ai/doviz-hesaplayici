<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Döviz Kıyas Ekranı</title>

<style>
  * { box-sizing: border-box; }

  body{
    margin:0;
    padding:10px;
    font-family:Arial,sans-serif;
    background:#e9edf3;
    color:#1f2937;
  }

  .app{
    max-width:1100px;
    margin:auto;
    background:#f4f6fa;
    border-radius:18px;
    overflow:hidden;
    box-shadow:0 6px 18px rgba(0,0,0,0.12);
    border:1px solid #cfd7e3;
  }

  .topbar{
    background:linear-gradient(180deg,#243f73,#1d3460);
    color:#fff;
    padding:18px 18px 14px;
    text-align:center;
  }

  .topbar-title{
    font-size:22px;
    font-weight:800;
    letter-spacing:0.4px;
  }

  .content{
    padding:18px;
  }

  .field-label{
    font-size:15px;
    font-weight:700;
    color:#667085;
    margin:10px 0 6px;
    text-transform:uppercase;
    letter-spacing:0.3px;
  }

  .input-wrap{
    background:#fff;
    border:1px solid #cfd7e3;
    border-radius:14px;
    overflow:hidden;
    box-shadow:0 2px 6px rgba(0,0,0,0.05);
  }

  input{
    width:100%;
    border:none;
    outline:none;
    background:transparent;
    padding:18px 20px;
    font-size:22px;
    font-weight:700;
    color:#203864;
  }

  input::placeholder{
    color:#9aa4b2;
    font-weight:500;
  }

  .cards{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:14px;
    margin-top:18px;
  }

  .card{
    border-radius:14px;
    padding:16px 14px;
    color:#fff;
    text-align:center;
    box-shadow:0 2px 8px rgba(0,0,0,0.08);
  }

  .card.usd, .card.gbp{
    background:#243f73;
  }

  .card.eur{
    background:#4d8750;
  }

  .card .title{
    font-size:18px;
    font-weight:800;
    margin-bottom:12px;
  }

  .card .sub{
    font-size:14px;
    opacity:0.95;
    margin-bottom:6px;
  }

  .card .service-tl{
    font-size:18px;
    font-weight:700;
    margin-bottom:4px;
  }

  .card .service-value{
    font-size:26px;
    font-weight:800;
    margin-bottom:14px;
    line-height:1.15;
  }

  .card .customer-value{
    font-size:18px;
    font-weight:700;
    margin-bottom:12px;
  }

  .card .diff{
    margin-top:8px;
    border-radius:10px;
    padding:10px 8px;
    font-size:18px;
    font-weight:800;
    background:rgba(255,255,255,0.14);
  }

  .card .diff.positive{
    background:#188c2f;
  }

  .card .diff.negative{
    background:#b42318;
  }

  .rates-panel{
    margin-top:18px;
    background:#fff;
    border:1px solid #d7dee8;
    border-radius:14px;
    padding:14px 16px;
  }

  .rates-title{
    text-align:center;
    font-size:16px;
    font-weight:800;
    color:#42526b;
    margin-bottom:12px;
  }

  .rates{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:8px;
    text-align:center;
  }

  .rate-item{
    font-size:18px;
    font-weight:800;
    color:#243f73;
  }

  .buttons{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:14px;
    margin-top:18px;
  }

  button{
    border:none;
    border-radius:12px;
    padding:16px 14px;
    font-size:20px;
    font-weight:800;
    cursor:pointer;
  }

  .btn-calc{
    background:#239a2b;
    color:#fff;
  }

  .btn-reset{
    background:#5c6778;
    color:#fff;
  }

  .menu-btn{
    width:100%;
    margin-bottom:14px;
    background:#1f4fa3;
    color:white;
    border-radius:12px;
    padding:14px;
    font-size:18px;
  }

  .menu{
    display:none;
    margin-bottom:20px;
  }

  .menu-item{
    background:white;
    padding:14px;
    border-radius:10px;
    margin-bottom:8px;
    border:1px solid #cfd7e3;
    font-weight:700;
  }
</style>
</head>

<body>

<div class="app">

  <div class="topbar">
    <div class="topbar-title">ERDAL AVARA</div>
  </div>

  <div class="content">

<button class="menu-btn" onclick="toggleMenu()">HİZMET MENÜSÜ</button>

<div class="menu" id="menu">
  <div class="menu-item">KESİM</div>
  <div class="menu-item">BOYA</div>
  <div class="menu-item">SARI SAÇ</div>
  <div class="menu-item">ŞEKİLLENDİRME</div>
  <div class="menu-item">BAKIM</div>
</div>

    <div class="field-label">İşlem Tutarı (TL)</div>
    <div class="input-wrap">
      <input id="tl" type="text" inputmode="numeric" placeholder="Örn: 9.000">
    </div>

    <div class="field-label">ÖDENEN TUTAR</div>
    <div class="input-wrap">
      <input id="rakam" type="number" step="0.01" min="0" placeholder="Örn: 200">
    </div>

    <!-- geri kalan döviz kodların aynen devam ediyor -->

<script>

function toggleMenu(){
  const menu = document.getElementById("menu");
  menu.style.display = menu.style.display === "block" ? "none" : "block";
}

</script>

</body>
</html>
